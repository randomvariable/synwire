[book]
title = "Synwire Documentation"
authors = ["Synwire Contributors"]
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/randomvariable/synwire"
edit-url-template = "https://github.com/randomvariable/synwire/edit/main/docs/{path}"

[output.linkcheck]
optional = true
follow-web-links = false
traverse-parent-directories = false
