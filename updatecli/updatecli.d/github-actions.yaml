# updatecli policy: GitHub Actions SHA-pin updates
#
# Each manifest (--- separated) covers one action reference used across the
# workflow files. updatecli checks GitHub Releases for a newer tag, resolves
# it to its commit SHA, and opens a PR updating the relevant workflow files.
#
# The `file` kind with matchPattern is used instead of yaml key paths because
# step indexes change as workflows evolve.
#
# Extend this file by adding a new --- block for each new action added to
# any workflow file.

---
scms:
  default:
    kind: github
    spec:
      user: '{{ env "GITHUB_ACTOR" | default "updatecli-bot" }}'
      email: "updatecli@users.noreply.github.com"
      owner: randomvariable
      repository: synwire
      token: '{{ env "GITHUB_TOKEN" }}'
      branch: main
      commitmessage:
        type: chore
        scope: deps

sources:
  actions-checkout:
    kind: githubrelease
    spec:
      owner: actions
      repository: checkout
      token: '{{ env "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: ">=0"

targets:
  ci:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/ci.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  nightly:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/nightly.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  coverage:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/coverage.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  release:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/release.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  pages:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/pages.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  codeql:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/codeql.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  sbom:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/sbom.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  scorecard:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/scorecard.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default
  updatecli:
    kind: file
    sourceid: actions-checkout
    spec:
      file: .github/workflows/updatecli.yml
      matchpattern: 'actions/checkout@\S+(\s+#\s+\S+)?'
      replacepattern: 'actions/checkout@{{ source "actions-checkout" }}  # {{ source "actions-checkout" }}'
    scmid: default

