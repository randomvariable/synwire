name: OSV-Scanner (PR)

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions: {}

jobs:
  scan-pr:
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3
    with:
      scan-args: "--lockfile=Cargo.lock"
