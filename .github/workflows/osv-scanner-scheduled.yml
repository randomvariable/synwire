name: OSV-Scanner (Scheduled)

on:
  push:
    branches: [main]
  schedule:
    # Full scan — daily at 02:00 UTC
    - cron: "0 2 * * *"

permissions: {}

jobs:
  scan-scheduled:
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3
    with:
      scan-args: "--lockfile=Cargo.lock"
      fail-on-vuln: true
