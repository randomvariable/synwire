name: OSV-Scanner (Scheduled)

on:
  push:
    branches: [main]
  schedule:
    # Full scan — daily at 02:00 UTC
    - cron: "0 2 * * *"

permissions: {}

jobs:
  scan-scheduled:
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c5996e0193a3df57d695c1b8a1dec2a4c62e8730  # v2.3.3
    with:
      scan-args: "--lockfile=Cargo.lock"
      fail-on-vuln: true
