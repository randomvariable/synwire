name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      # Publish in dependency order, with delays for crates.io index propagation

      # Layer 0 — no intra-workspace dependencies
      - name: Publish synwire-core
        run: cargo publish -p synwire-core --no-verify
      - name: Publish synwire-storage
        run: cargo publish -p synwire-storage --no-verify

      - name: Wait for index
        run: sleep 30

      # Layer 1 — depend only on synwire-core / synwire-storage
      - name: Publish synwire-derive
        run: cargo publish -p synwire-derive --no-verify
      - name: Publish synwire-checkpoint
        run: cargo publish -p synwire-checkpoint --no-verify
      - name: Publish synwire-sandbox
        run: cargo publish -p synwire-sandbox --no-verify
      - name: Publish synwire-chunker
        run: cargo publish -p synwire-chunker --no-verify
      - name: Publish synwire-embeddings-local
        run: cargo publish -p synwire-embeddings-local --no-verify
      - name: Publish synwire-vectorstore-lancedb
        run: cargo publish -p synwire-vectorstore-lancedb --no-verify
      - name: Publish synwire-lsp
        run: cargo publish -p synwire-lsp --no-verify
      - name: Publish synwire-dap
        run: cargo publish -p synwire-dap --no-verify
      - name: Publish synwire-llm-openai
        run: cargo publish -p synwire-llm-openai --no-verify
      - name: Publish synwire-llm-ollama
        run: cargo publish -p synwire-llm-ollama --no-verify

      - name: Wait for index
        run: sleep 30

      # Layer 2 — depend on layer 1
      - name: Publish synwire-checkpoint-sqlite
        run: cargo publish -p synwire-checkpoint-sqlite --no-verify
      - name: Publish synwire-orchestrator
        run: cargo publish -p synwire-orchestrator --no-verify
      - name: Publish synwire-agent-skills
        run: cargo publish -p synwire-agent-skills --no-verify
      - name: Publish synwire-index
        run: cargo publish -p synwire-index --no-verify

      - name: Wait for index
        run: sleep 30

      # Layer 3 — depend on layer 2
      - name: Publish synwire-agent
        run: cargo publish -p synwire-agent --no-verify
      - name: Publish synwire-daemon
        run: cargo publish -p synwire-daemon --no-verify

      - name: Wait for index
        run: sleep 30

      # Layer 4 — depends on synwire-agent
      - name: Publish synwire-mcp-adapters
        run: cargo publish -p synwire-mcp-adapters --no-verify

      - name: Wait for index
        run: sleep 30

      # Layer 5 — depends on layers 1–4
      - name: Publish synwire-mcp-server
        run: cargo publish -p synwire-mcp-server --no-verify

      - name: Wait for index
        run: sleep 30

      # Layer 6 — convenience re-exports, depends on everything
      - name: Publish synwire
        run: cargo publish -p synwire --no-verify

  goreleaser:
    name: GoReleaser
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install Zig
        uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Install rcodesign
        run: cargo install --locked apple-codesign

      - name: Add Rust targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
