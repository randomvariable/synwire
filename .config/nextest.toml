[store]
dir = "target/nextest"

[profile.default]
retries = 0
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = true

[profile.default.junit]
path = "junit.xml"

[profile.ci]
retries = 2
slow-timeout = { period = "120s", terminate-after = 3 }
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

# Test groups for concurrency control
[[profile.default.overrides]]
filter = "test(::prop_)"
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "test(::e2e_)"
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = "test(::prop_)"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.ci.overrides]]
filter = "test(::e2e_)"
slow-timeout = { period = "120s", terminate-after = 3 }

# API tests group — limit concurrency to avoid rate-limiting
[test-groups.api-tests]
max-threads = 4

[[profile.default.overrides]]
filter = "package(synwire-llm-openai) | package(synwire-llm-ollama)"
test-group = "api-tests"

[[profile.ci.overrides]]
filter = "package(synwire-llm-openai) | package(synwire-llm-ollama)"
test-group = "api-tests"
