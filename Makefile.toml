[config]
default_to_workspace = false

# ---------------------------------------------------------------------------
# Individual tasks
# ---------------------------------------------------------------------------

[tasks.fmt]
description = "Check formatting (cargo fmt --check)"
command = "cargo"
args = [
  "fmt",
  "--all",
  "--",
  "--check",
]

[tasks.fmt-fix]
description = "Auto-format all code"
command = "cargo"
args = [
  "fmt",
  "--all",
]

[tasks.clippy]
description = "Run clippy with deny warnings"
command = "cargo"
args = [
  "clippy",
  "--workspace",
  "--all-targets",
  "--all-features",
  "--",
  "-D",
  "warnings",
]

[tasks.test]
description = "Run tests with nextest"
command = "cargo"
args = [
  "nextest",
  "run",
  "--workspace",
  "--all-features",
]

[tasks.doctest]
description = "Run doc-tests"
command = "cargo"
args = [
  "test",
  "--workspace",
  "--doc",
]

[tasks.doc]
description = "Build documentation with deny warnings"
command = "cargo"
args = [
  "doc",
  "--workspace",
  "--no-deps",
  "--all-features",
]

[tasks.doc.env]
RUSTDOCFLAGS = "-Dwarnings"

[tasks.coverage]
clear = true
description = "Generate code coverage report"
command = "cargo"
args = [
  "llvm-cov",
  "nextest",
  "--workspace",
  "--all-features",
  "--lcov",
  "--output-path",
  "lcov.info",
]

[tasks.geiger]
description = "Audit for unsafe code usage (runs per-crate; cargo-geiger does not support workspace-level execution)"
script = """
set -e
for crate_dir in crates/*/; do
  crate_name=$(basename "$crate_dir")
  echo "--- cargo-geiger: $crate_name ---"
  cargo geiger --all-features --all-targets --manifest-path "$(realpath "$crate_dir/Cargo.toml")" 2>&1 | grep -v "^Failed to match" || true
done
"""

[tasks.audit]
description = "Audit dependencies for vulnerabilities"
command = "cargo"
args = [
  "audit",
]

[tasks.msrv-check]
description = "Check compilation with MSRV (1.88)"
toolchain = "1.88.0"
command = "cargo"
args = [
  "check",
  "--workspace",
  "--all-features",
]

[tasks.mdbook]
description = "Build mdBook documentation"
command = "mdbook"
args = [
  "build",
  "docs",
]

[tasks.prop-tests]
description = "Run property-based tests (extended)"
command = "cargo"
args = [
  "nextest",
  "run",
  "--workspace",
  "--all-features",
  "-E",
  "binary(/prop_/)",
]

[tasks.osv-scan]
description = "Scan Cargo.lock for known vulnerabilities (OSV database)"
command = "osv-scanner"
args = [
  "--lockfile=Cargo.lock",
]

[tasks.sbom]
description = "Generate SPDX 2.3 JSON SBOM for the workspace (requires syft on PATH)"
command = "syft"
args = [
  "scan",
  ".",
  "--output",
  "spdx-json=sbom.spdx.json",
]

[tasks.codeql]
description = "Run CodeQL SAST locally (requires codeql CLI on PATH; mirrors CI build-mode: none)"
script = """
set -e
echo "Creating CodeQL database (build-mode: none)..."
codeql database create codeql-db \
  --language=rust \
  --build-mode=none \
  --overwrite
echo "Analysing with security-extended suite..."
codeql database analyze codeql-db \
  --format=sarif-latest \
  --output=codeql-results.sarif \
  codeql/rust-queries:codeql-suites/rust-security-extended.qls
echo "Results written to codeql-results.sarif"
"""

[tasks.scorecard]
description = "Run OSSF Scorecard locally (requires scorecard CLI and GITHUB_TOKEN)"
command = "scorecard"
args = [
  "--repo=github.com/randomvariable/synwire",
  "--format=text",
]

[tasks.updatecli-diff]
description = "Preview dependency updates without raising PRs (auto-sources GITHUB_TOKEN from 'gh auth token' if not set)"
script = """
set -e
GITHUB_TOKEN="${GITHUB_TOKEN:-$(gh auth token 2>/dev/null || true)}"
export GITHUB_TOKEN
updatecli pipeline diff --config updatecli/updatecli.d --experimental
"""

[tasks.updatecli-apply]
description = "Apply dependency updates and raise PRs (auto-sources GITHUB_TOKEN from 'gh auth token' if not set)"
script = """
set -e
GITHUB_TOKEN="${GITHUB_TOKEN:-$(gh auth token 2>/dev/null || true)}"
export GITHUB_TOKEN
updatecli pipeline apply --config updatecli/updatecli.d --experimental
"""

[tasks.goreleaser]
description = "Run GoReleaser release on the current tag (requires GITHUB_TOKEN and HOMEBREW_TAP_GITHUB_TOKEN)"
script = """
set -e
GITHUB_TOKEN="${GITHUB_TOKEN:-$(gh auth token 2>/dev/null || true)}"
export GITHUB_TOKEN
if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
  echo "HOMEBREW_TAP_GITHUB_TOKEN is not set; Homebrew tap push will fail"
fi
goreleaser release --clean
"""

[tasks.publish]
clear = true
description = "Publish all crates to crates.io in dependency order. Env: ALLOW_DIRTY=1, PUBLISH_DELAY=<seconds> (default 10)."
script = """
set -e

# --- helpers -----------------------------------------------------------------

get_version() {
  cargo pkgid -p "$1" | sed 's/.*[#@]//'
}

is_published() {
  local crate="$1"
  local version
  version=$(get_version "$crate")
  local status
  status=$(curl -s -o /dev/null -w "%{http_code}" \
    -H "User-Agent: synwire-release-script/1.0" \
    "https://crates.io/api/v1/crates/$crate/$version")
  [ "$status" = "200" ]
}

publish_crate() {
  local crate="$1"
  if is_published "$crate"; then
    echo "--- skip $crate (already published) ---"
    return 0
  fi

  local max_retries=5
  local attempt=0
  local tmp
  tmp=$(mktemp)

  while true; do
    attempt=$((attempt + 1))
    if [ $attempt -gt 1 ]; then
      echo "--- publishing $crate (retry $((attempt-1))/$((max_retries-1))) ---"
    else
      echo "--- publishing $crate ---"
    fi

    local exit_code=0
    if [ "${ALLOW_DIRTY:-0}" = "1" ]; then
      cargo publish -p "$crate" --no-verify --allow-dirty >"$tmp" 2>&1 && exit_code=0 || exit_code=$?
    else
      cargo publish -p "$crate" --no-verify >"$tmp" 2>&1 && exit_code=0 || exit_code=$?
    fi
    cat "$tmp"

    if [ $exit_code -eq 0 ]; then
      rm -f "$tmp"
      local delay="${PUBLISH_DELAY:-10}"
      if [ "$delay" -gt 0 ]; then
        echo "    waiting ${delay}s between publishes"
        sleep "$delay"
      fi
      return 0
    fi

    if grep -qE "429|Too Many Requests" "$tmp" && [ $attempt -lt $max_retries ]; then
      local retry_after retry_epoch now_epoch wait_secs
      retry_after=$(grep -o 'after [A-Za-z0-9, :]*GMT' "$tmp" | sed 's/after //')
      if [ -n "$retry_after" ]; then
        retry_epoch=$(date -d "$retry_after" +%s 2>/dev/null || echo 0)
        now_epoch=$(date +%s)
        wait_secs=$((retry_epoch - now_epoch + 5))
        if [ "$wait_secs" -gt 0 ]; then
          echo "    rate limited — sleeping ${wait_secs}s until $retry_after"
          sleep "$wait_secs"
        fi
      else
        echo "    rate limited (no retry-after) — sleeping 60s"
        sleep 60
      fi
      continue
    fi

    rm -f "$tmp"
    return $exit_code
  done
  rm -f "$tmp"
  echo "ERROR: $crate failed after $max_retries attempts"
  return 1
}

# Poll crates.io until a crate version is visible, then move on.
# Times out after ~5 minutes (30 attempts × 10s).
wait_for_crate() {
  local crate="$1"
  local version
  version=$(get_version "$crate")
  local attempt=0
  local max=30
  echo "--- waiting for $crate@$version ---"
  while [ $attempt -lt $max ]; do
    local status
    status=$(curl -s -o /dev/null -w "%{http_code}" \
      -H "User-Agent: synwire-release-script/1.0" \
      "https://crates.io/api/v1/crates/$crate/$version")
    if [ "$status" = "200" ]; then
      echo "    available"
      return 0
    fi
    attempt=$((attempt + 1))
    echo "    [$attempt/$max] not yet visible, retrying in 10s..."
    sleep 10
  done
  echo "ERROR: $crate@$version not visible after $((max * 10))s"
  return 1
}

# Publish every crate in a layer, then wait for each to appear in the index.
publish_layer() {
  for crate in "$@"; do
    publish_crate "$crate"
  done
  for crate in "$@"; do
    wait_for_crate "$crate"
  done
}

# --- layers ------------------------------------------------------------------

# Layer 0 — no intra-workspace dependencies
publish_layer synwire-core synwire-storage

# Layer 1 — depend only on synwire-core / synwire-storage
publish_layer \
  synwire-derive synwire-checkpoint synwire-sandbox synwire-chunker \
  synwire-embeddings-local synwire-vectorstore-lancedb \
  synwire-lsp synwire-dap synwire-llm-openai synwire-llm-ollama

# Layer 2 — depend on layer 1
publish_layer \
  synwire-checkpoint-sqlite synwire-orchestrator \
  synwire-agent-skills synwire-index

# Layer 3 — depend on layer 2
publish_layer synwire-agent synwire-daemon

# Layer 4 — depends on synwire-agent
publish_layer synwire-mcp-adapters

# Layer 5 — depends on layers 1-4
publish_layer synwire-mcp-server

# Layer 6 — convenience re-exports, depends on everything
publish_layer synwire
"""

# ---------------------------------------------------------------------------
# Composite tasks
# ---------------------------------------------------------------------------

[tasks.ci]
description = "Run all Tier 1 CI checks (fmt + clippy + test + doctest + doc)"
dependencies = [
  "fmt",
  "clippy",
  "test",
  "doctest",
  "doc",
]

[tasks.ci-full]
description = "Run Tier 1 + Tier 2 CI checks"
dependencies = [
  "ci",
  "geiger",
]

[tasks.nightly]
description = "Run nightly checks (prop tests + audit + osv-scan + MSRV)"
dependencies = [
  "prop-tests",
  "audit",
  "osv-scan",
  "msrv-check",
]

[tasks.security]
description = "Run all local supply-chain security checks (audit + osv-scan + geiger)"
dependencies = [
  "audit",
  "osv-scan",
  "geiger",
]
