[config]
default_to_workspace = false

# ---------------------------------------------------------------------------
# Individual tasks
# ---------------------------------------------------------------------------

[tasks.fmt]
description = "Check formatting (cargo fmt --check)"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt-fix]
description = "Auto-format all code"
command = "cargo"
args = ["fmt", "--all"]

[tasks.clippy]
description = "Run clippy with deny warnings"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.test]
description = "Run tests with nextest"
command = "cargo"
args = ["nextest", "run", "--workspace", "--all-features"]

[tasks.doctest]
description = "Run doc-tests"
command = "cargo"
args = ["test", "--workspace", "--doc"]

[tasks.doc]
description = "Build documentation with deny warnings"
command = "cargo"
args = ["doc", "--workspace", "--no-deps", "--all-features"]

[tasks.doc.env]
RUSTDOCFLAGS = "-Dwarnings"

[tasks.coverage]
clear = true
description = "Generate code coverage report"
command = "cargo"
args = ["llvm-cov", "nextest", "--workspace", "--all-features", "--lcov", "--output-path", "lcov.info"]

[tasks.geiger]
description = "Audit for unsafe code usage"
command = "cargo"
args = ["geiger", "--all-features", "--all-targets"]

[tasks.audit]
description = "Audit dependencies for vulnerabilities"
command = "cargo"
args = ["audit"]

[tasks.msrv-check]
description = "Check compilation with MSRV (1.85)"
toolchain = "1.88.0"
command = "cargo"
args = ["check", "--workspace", "--all-features"]

[tasks.mdbook]
description = "Build mdBook documentation"
command = "mdbook"
args = ["build", "docs"]

[tasks.prop-tests]
description = "Run property-based tests (extended)"
command = "cargo"
args = ["nextest", "run", "--workspace", "--all-features", "-E", "binary(/prop_/)"]

# ---------------------------------------------------------------------------
# Composite tasks
# ---------------------------------------------------------------------------

[tasks.ci]
description = "Run all Tier 1 CI checks (fmt + clippy + test + doctest + doc)"
dependencies = ["fmt", "clippy", "test", "doctest", "doc"]

[tasks.ci-full]
description = "Run Tier 1 + Tier 2 CI checks"
dependencies = ["ci", "geiger"]

[tasks.nightly]
description = "Run nightly checks (prop tests + audit + MSRV)"
dependencies = ["prop-tests", "audit", "msrv-check"]
